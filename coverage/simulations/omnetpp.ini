[General]
network = OGDCNetwork
sim-time-limit = 18000s        # 10 rounds (roundTime=1000s each)

# ── Match the paper: up to 1000 nodes in 50×50 m² ──────────────────────────
**.numSensors = 100            # change to 500 or 1000 to match paper Fig.3

# ── Paper parameters ────────────────────────────────────────────────────────
**.sensingRange = 10m          # rs = 10m
**.radioRange   = 20m          # rc = 2*rs  (connectivity implied by coverage)
**.areaSize     = 50m
**.initialEnergy = 100        
**.roundTime    = 19000s
**.Td           = 0.01s        # 10 ms  (paper Table value)
**.Ts           = 1s           # 1 s    (paper Table value)
**.Te           = 0.2s         # Ts/5   (paper Table value)
**.useGreedyMSC = false         # 0/false = off, 1/true = 4-phase Greedy-MSC clustering
**.clusterDistThreshold = 0.25 # Phase 1: join cluster if avg-distance differs by ≤ 25%
**.greedyW = 1.0               # active time weight w (1.0 = disjoint groups, 0.5 = overlap)
**.useReselection = true      # 0/false = off, 1/true = reactive reselection on coverage drop
**.coverageThreshold = 0.1    # trigger reselection when coverage drops below this (0.0–1.0)
**.maxReselections = 50        # max reselection attempts per round (safety limit)
**.statsInterval = 10s         # coverage measurement interval for graphs

# ── Reproducible random placement ───────────────────────────────────────────
seed-set = 0

# ── Record statistics ────────────────────────────────────────────────────────
# Record from all sensors so the signal is captured regardless of which
# node acts as coordinator (lowest-alive-index).
**.coverage.result-recording-modes   = all
**.activeNodes.result-recording-modes = all

# ─────── Configurations matching the paper's Fig.3 scenarios ────────────────
[Config N100]
description = "100 sensors — quick test"
**.numSensors = 100

[Config N300]
description = "300 sensors"
**.numSensors = 300

[Config N500]
description = "500 sensors"
**.numSensors = 500

[Config N1000]
description = "1000 sensors — paper environment"
**.numSensors = 1000